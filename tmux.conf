# Prefix: Ctrl+b (default)
set -g prefix C-b
bind C-b send-prefix

# Use zsh as default shell with login flag so .zprofile is sourced
set -g default-shell /bin/zsh
set -g default-command "zsh --login"

# Terminal features
set -g default-terminal "tmux-256color"
set -g escape-time 10
set -g focus-events on
set -g mouse on

# Windows & panes start at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Scrollback
set -g history-limit 10000

# Resize to active client, not smallest
setw -g aggressive-resize on

# Extended keys — Shift+Enter, Ctrl+keys, etc.
set -g extended-keys always
set -gs extended-keys-format csi-u

# Clipboard (OSC 52)
set -g set-clipboard on
set -g allow-passthrough on

# True color, undercurl, cursor shape
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*:Smulx=\\E[4::%p1%dm"
set -ga terminal-overrides ",*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title"

# --- Vi copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Navigation ---
# Panes: vim-like hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Windows: Ctrl+h/l
bind C-h previous-window
bind C-l next-window

# Sessions: 9/0
bind 9 switch-client -p
bind 0 switch-client -n

# Tree view
bind C-j choose-tree -Zs

# --- Windows & Panes ---
# New window in current path
bind c new-window -c "#{pane_current_path}"

# Splits in current path
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Join pane from another window
bind J choose-window "join-pane -v -s '%%'"
bind H choose-window "join-pane -h -s '%%'"

# Layout
bind t select-layout tiled
bind y set-window-option synchronize-panes

# --- Resize (no prefix) ---
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 2
bind -n S-Up resize-pane -U 2
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 10
bind -n C-Up resize-pane -U 10

# --- Utilities ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind / display-popup -w 40 -h 16 -E "cat ~/.tmux-help.conf"

# --- Minimal status bar ---
set -g status on
set -g status-position bottom
set -g status-style "bg=colour237,fg=colour223"
set -g status-left " #S "
set -g status-left-style "bg=colour241,fg=colour223,bold"
set -g status-left-length 20
set -g status-right ""
set -g status-right-length 0
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=colour214,fg=colour237,bold"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @tmux-fzf-url-history-limit '200'
set -g @fzf-url-fzf-options '-m --bind "ctrl-a:select-all" -w 100% -h 20% --layout=reverse'

run -b '~/.tmux/plugins/tpm/tpm'
